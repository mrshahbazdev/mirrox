<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision2UI Master Canvas PRO</title>
    
    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050507; color: #cbd5e1; margin: 0; overflow: hidden; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 99px; }
        
        .blob { position: absolute; width: 400px; height: 400px; background: rgba(99, 102, 241, 0.05); filter: blur(100px); border-radius: 50%; z-index: 0; pointer-events: none; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        #root { height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 1; }
    </style>
</head>
<body>
    <div class="blob" style="top: -100px; left: -100px;"></div>
    <div class="blob" style="bottom: -100px; right: -100px; background: rgba(139, 92, 246, 0.05);"></div>
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const COMPONENT_SHORTCUTS = [
          { id: 'hero', label: 'Hero', p: 'Add a bold hero section with glassy CTAs.' },
          { id: 'grid', label: 'Bento Grid', p: 'Add a 3-column bento grid for features.' },
          { id: 'pricing', label: 'Pricing', p: 'Add a premium 3-tier pricing table.' },
        ];

        const App = () => {
          const [apiKey, setApiKey] = useState(localStorage.getItem('v2ui_api_key') || '');
          const [brand, setBrand] = useState(() => {
            const saved = localStorage.getItem('v2ui_brand');
            return saved ? JSON.parse(saved) : { name: '', logo: '', primary: '#6366F1' };
          });
          
          const [prompt, setPrompt] = useState('');
          const [isLoading, setIsLoading] = useState(false);
          const [variations, setVariations] = useState([]);
          const [activeIndex, setActiveIndex] = useState(0);
          const [previewMode, setPreviewMode] = useState('desktop');
          const [activeTab, setActiveTab] = useState('preview');
          const [liveStyles, setLiveStyles] = useState({ primary: brand.primary, radius: '12' });
          const [showSettings, setShowSettings] = useState(!apiKey);
          const [auditResult, setAuditResult] = useState('');

          const iframeRef = useRef(null);

          useEffect(() => { localStorage.setItem('v2ui_api_key', apiKey); }, [apiKey]);
          useEffect(() => { localStorage.setItem('v2ui_brand', JSON.stringify(brand)); }, [brand]);

          useEffect(() => {
            if (variations.length > 0 && iframeRef.current) {
              const doc = iframeRef.current.contentDocument;
              if (doc) {
                let s = doc.getElementById('v2-s') || doc.createElement('style');
                s.id = 'v2-s';
                if (!doc.head.contains(s)) doc.head.appendChild(s);
                s.innerHTML = `
                  :root { --p: ${liveStyles.primary}; --r: ${liveStyles.radius}px; }
                  .bg-indigo-600, .bg-primary, .bg-blue-600 { background: var(--p) !important; }
                  .text-indigo-600, .text-primary { color: var(--p) !important; }
                  .rounded-xl, .rounded-2xl { border-radius: var(--r) !important; }
                `;
              }
            }
          }, [liveStyles, variations, activeIndex, activeTab]);

          const generate = async () => {
             if(!apiKey) return setShowSettings(true);
             setIsLoading(true); setAuditResult('');
             try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: `Generate a high-end UI for: ${prompt}. Brand: ${brand.name}. Primary: ${brand.primary}. Return RAW JSON ONLY { "Design": "HTML String" }. Use Tailwind & FontAwesome.` }] }],
                    generationConfig: { responseMimeType: 'application/json' }
                  })
                });
                const data = await resp.json();
                const vars = Object.entries(JSON.parse(data.candidates[0].content.parts[0].text)).map(([n, h]) => ({ name: n, html: h }));
                setVariations(vars); setActiveIndex(0); setActiveTab('preview');
             } catch (e) { alert(e.message); } finally { setIsLoading(false); }
          };

          const runAudit = async () => {
             setIsLoading(true); setActiveTab('audit');
             try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ contents: [{ parts: [{ text: `Audit this UI for UX/Accessibility. Return Markdown.\n\nCODE:\n${variations[activeIndex].html}` }] }] })
                });
                const data = await resp.json();
                setAuditResult(data.candidates[0].content.parts[0].text);
             } catch (e) { setAuditResult(e.message); } finally { setIsLoading(false); }
          };

          return (
            <div className="flex h-full overflow-hidden">
              {/* Sidebar */}
              <aside className="w-80 bg-[#0a0a0c] border-r border-white/5 p-6 flex flex-col gap-6 overflow-y-auto no-scrollbar relative z-10">
                <div className="flex items-center gap-3">
                  <div className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-600/20"><i className="fa-solid fa-wand-magic-sparkles text-white"></i></div>
                  <div>
                    <h1 className="text-white font-black tracking-tighter uppercase italic text-lg leading-none">Vision2UI</h1>
                    <p className="text-[8px] font-black text-indigo-400 uppercase tracking-widest mt-1">Master Studio</p>
                  </div>
                </div>

                <div className="space-y-4 pt-4">
                   <label className="text-[10px] font-black uppercase text-slate-500 tracking-widest flex items-center gap-2"><i className="fa-solid fa-terminal text-indigo-500"></i> Prompt Engine</label>
                   <textarea value={prompt} onChange={e=>setPrompt(e.target.value)} className="w-full h-28 bg-white/5 border border-white/5 rounded-2xl p-4 text-xs text-white outline-none focus:border-indigo-500/50 resize-none transition-all" placeholder="E.g. Dark premium SaaS portal..." />
                   
                   <div className="flex flex-wrap gap-2">
                     {COMPONENT_SHORTCUTS.map(c => (
                       <button key={c.id} onClick={()=>setPrompt(p=>p+(p?' ':'')+c.p)} className="px-3 py-1.5 bg-white/5 border border-white/5 rounded-lg text-[9px] font-bold text-slate-400 hover:text-white transition-all">{c.label}</button>
                     ))}
                   </div>
                </div>

                <button onClick={generate} disabled={isLoading} className="w-full py-4 bg-indigo-600 rounded-2xl text-white font-black text-xs uppercase shadow-xl shadow-indigo-600/20 transition-all hover:bg-indigo-500 active:scale-95 disabled:opacity-50">
                   {isLoading ? <i className="fa-solid fa-circle-notch animate-spin mr-2"></i> : null}
                   {isLoading ? 'Processing...' : 'Run Lab Engine'}
                </button>

                {variations.length > 0 && (
                   <div className="space-y-6 pt-6 border-t border-white/5">
                      <div className="space-y-4">
                         <label className="text-[10px] font-black uppercase text-slate-500 tracking-widest"><i className="fa-solid fa-brush mr-2 text-indigo-400"></i> Style Mixer</label>
                         <div className="bg-white/5 p-4 rounded-2xl border border-white/5 space-y-4">
                            <div className="flex items-center justify-between">
                               <input type="color" value={liveStyles.primary} onChange={e=>setLiveStyles({...liveStyles, primary: e.target.value})} className="w-12 h-8 bg-transparent border-0 cursor-pointer" />
                               <span className="text-[10px] font-mono text-slate-500">{liveStyles.primary.toUpperCase()}</span>
                            </div>
                            <input type="range" min="0" max="40" value={liveStyles.radius} onChange={e=>setLiveStyles({...liveStyles, radius: e.target.value})} className="w-full accent-indigo-500" />
                         </div>
                      </div>
                      <button onClick={runAudit} className="w-full py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase text-slate-400 hover:text-white transition-all"><i className="fa-solid fa-shield-halved mr-2 text-emerald-500"></i> System UX Audit</button>
                   </div>
                )}

                <button onClick={()=>setShowSettings(true)} className="mt-auto py-4 border-t border-white/5 text-[10px] font-black uppercase text-slate-600 hover:text-indigo-400 flex items-center justify-center gap-2 transition-colors"><i className="fa-solid fa-gear"></i> Studio Config</button>
              </aside>

              {/* Main */}
              <main className="flex-1 bg-[#0d0d10] flex flex-col relative">
                <header className="h-14 border-b border-white/5 bg-black/40 backdrop-blur-md flex items-center justify-between px-8 z-20">
                   <div className="flex gap-1.5 bg-white/5 p-1 rounded-xl">
                      {['preview', 'code', 'audit'].map(t => (
                        <button key={t} onClick={()=>setActiveTab(t)} className={`px-5 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-tighter transition-all ${activeTab === t ? 'bg-white/10 text-white shadow-xl' : 'text-slate-500 hover:text-slate-300'}`}>{t}</button>
                      ))}
                   </div>
                   <div className="flex gap-1 bg-white/5 p-1 rounded-lg">
                      {['mobile', 'desktop'].map(m => (
                        <button key={m} onClick={()=>setPreviewMode(m)} className={`p-1.5 rounded-md transition-all ${previewMode === m ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-white/5'}`}><i className={`fa-solid fa-${m==='mobile'?'mobile-screen':'desktop'}`}></i></button>
                      ))}
                   </div>
                </header>

                <div className="flex-1 p-10 flex items-center justify-center relative overflow-hidden">
                   {isLoading && (
                      <div className="absolute inset-0 bg-[#050507]/90 z-50 flex items-center justify-center backdrop-blur-2xl transition-all">
                        <div className="w-12 h-12 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                      </div>
                   )}
                   
                   {activeTab === 'preview' && variations.length > 0 && (
                      <div className={`transition-all duration-700 shadow-2xl overflow-hidden ${previewMode === 'mobile' ? 'w-[375px] h-[750px] rounded-[3.5rem] border-[12px] border-[#0a0a0c]' : 'w-full h-full rounded-2xl'}`}>
                         <iframe ref={iframeRef} srcDoc={variations[activeIndex].html} className="w-full h-full border-none bg-white" />
                      </div>
                   )}
                   {activeTab === 'code' && variations.length > 0 && (
                      <div className="absolute inset-0 bg-[#070709] p-12 overflow-auto font-mono text-[11px] text-indigo-300 leading-relaxed whitespace-pre-wrap">{variations[activeIndex].html}</div>
                   )}
                   {activeTab === 'audit' && (
                     <div className="absolute inset-0 bg-[#070709] p-12 overflow-auto flex flex-col items-center">
                        <div className="max-w-2xl w-full bg-white/[0.02] border border-white/5 p-10 rounded-[3rem] shadow-3xl">
                           <h2 className="text-2xl font-black uppercase mb-8 text-indigo-400 italic">UX Audit Analysis</h2>
                           <div className="prose prose-invert text-sm text-slate-300 leading-relaxed">{auditResult || 'Run an audit from the sidebar to see results.'}</div>
                        </div>
                     </div>
                   )}

                   {!variations.length && !isLoading && (
                      <div className="text-center opacity-10 pointer-events-none">
                        <i className="fa-solid fa-cube text-8xl text-indigo-500 mb-6"></i>
                        <h2 className="text-3xl font-black tracking-[0.5em] uppercase text-white">Standby</h2>
                      </div>
                   )}
                </div>
              </main>

              {/* Settings */}
              {showSettings && (
                <div className="fixed inset-0 z-[1000] flex items-center justify-center p-8 animate-in fade-in duration-300">
                  <div className="absolute inset-0 bg-black/95 backdrop-blur-3xl" onClick={()=>setShowSettings(false)} />
                  <div className="w-[440px] bg-[#0d0d12] border border-white/10 rounded-[3rem] p-12 relative z-10 shadow-3xl text-center">
                    <div className="w-16 h-16 bg-white/5 border border-white/5 rounded-3xl mx-auto mb-6 flex items-center justify-center text-indigo-500"><i className="fa-solid fa-microchip text-3xl"></i></div>
                    <h2 className="text-2xl font-black text-white uppercase italic mb-8">Intelligence Core</h2>
                    
                    <div className="space-y-6 text-left">
                       <div>
                         <label className="text-[10px] font-black uppercase text-slate-600 tracking-widest mb-2 block">Gemini API Key</label>
                         <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white font-mono text-sm focus:ring-1 focus:ring-indigo-600 outline-none" placeholder="Paste Key..." />
                       </div>
                       <div className="grid grid-cols-2 gap-4 pt-2">
                          <div>
                            <label className="text-[10px] font-black uppercase text-slate-600 tracking-widest mb-2 block">Brand Name</label>
                            <input type="text" value={brand.name} onChange={e=>setBrand({...brand, name: e.target.value})} className="w-full bg-white/5 border border-white/5 rounded-xl p-3 text-xs text-white outline-none" />
                          </div>
                          <div>
                             <label className="text-[10px] font-black uppercase text-slate-600 tracking-widest mb-2 block">Base Color</label>
                             <input type="color" value={brand.primary} onChange={e=>setBrand({...brand, primary: e.target.value})} className="w-full h-10 bg-transparent border-0 cursor-pointer" />
                          </div>
                       </div>
                    </div>
                    
                    <button onClick={()=>setShowSettings(false)} className="w-full mt-10 py-5 bg-indigo-600 rounded-2xl text-white font-black text-xs uppercase tracking-[0.2em] shadow-2xl shadow-indigo-600/30">Connect Core</button>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
